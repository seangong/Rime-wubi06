# Rime schema settings
# encoding: utf-8

schema:
  schema_id: wubi86_pinyin
  name: "五笔86·拼音"
  version: "0.9"
  author:
    - sean gong
  description: |
    五笔86版+拼音混合输入
  dependencies:
    - pinyin_simp

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: extended_charset
    states: [ 常用, 增广 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator                 # 五笔翻译器
    - script_translator@pinyin         # 拼音混输翻译器
    - reverse_lookup_translator        # 反查翻译器

# 五笔主输入配置
translator:
  dictionary: wubi86
  prism: wubi86_pinyin
  enable_charset_filter: true
  enable_sentence: false              # 五笔建议关闭连打成句，保持单字/词组精准度
  enable_encoder: true
  encode_commit_history: true
  max_phrase_length: 4
  disable_user_dict_for_patterns:
    - "^[a-y]{1,3}$"                   # 保留原版精髓：五笔前3码绝对不调频，固定字序

# 独立拼音混输外挂（让方案完美支持直接打拼音）
pinyin:
  dictionary: pinyin_simp
  prism: wubi06_pinyin
  explicit_rendering: true
  tips: "〔拼音〕"

speller:
  delimiter: " ;'"
  max_code_length: 4                      # 最长 4 码
  auto_select: true                       # 顶字上屏
  auto_select_unique_candidate: true      # 无重码自动上屏

# ctrl + ` 键反查逻辑
reverse_lookup:
  dictionary: pinyin_simp
  prefix: "`"
  suffix: "'"
  tips: 〔拼音反查〕
  preedit_format:
    - xform/([nl])v/$1ü/
    - xform/([nl])ue/$1üe/
    - xform/([jqxy])v/$1/

# 快捷键魔改
key_binder:
  import_preset: default
  bindings:
    - {accept: Return, send: Escape, when: composing}   # 回车清空输入码
    - {accept: semicolon, send: 2, when: has_menu}      # 分号选第 2 重码
    - {accept: apostrophe, send: 3, when: has_menu}     # 单引号选第 3 重码

punctuator:
  import_preset: symbols

recognizer:
  import_preset: default
  patterns:
    punct: "^/([a-z]+|[0-9])$"
    reverse_lookup: "`[a-z]*'?$"

show_notifications_via_notification_center: false
us_keyboard_layout: true